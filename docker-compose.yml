version: '3.8'

services:
  db:
    image: postgres:15
    container_name: vefox_db
    restart: always
    environment:
      POSTGRES_USER: vefox_user
      POSTGRES_PASSWORD: vefox_password
      POSTGRES_DB: vefox_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: